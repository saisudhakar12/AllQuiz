<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Quiz Project</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <!-- ADMIN PAGE -->
    <section id="adminPage" class="admin-section">
      <div class="admin-header">
        <h1>🎓 Quiz Admin Settings</h1>
        <p>Configure your quiz experience before starting</p>
      </div>

      <div class="admin-content">
        <div class="admin-card">
          <h3>Select Theme</h3>
          <select id="themeSelect" class="admin-dropdown">
            <option value="default">Default - Fresh Blue</option>
            <option value="ocean">Ocean - Deep Blue & Teal</option>
            <option value="sunset">Sunset - Orange & Purple</option>
            <option value="forest">Forest - Green & Earth Tones</option>
            <option value="candy">Candy - Pink & Pastel</option>
            <option value="midnight">Midnight - Dark & Gold</option>
          </select>
        </div>

        <div class="admin-card">
          <h3>Question Display Mode</h3>
          <select id="displayMode" class="admin-dropdown">
            <option value="random">Random Questions</option>
            <option value="serial">Serial Questions (By Range)</option>
          </select>
        </div>

        <div class="admin-card">
          <h3>Select Questions</h3>
          <div id="questionRangeContainer" class="hidden">
            <label for="rangeSelect">Select Question Range:</label>
            <select id="rangeSelect" class="admin-dropdown">
              <option value="">-- Choose a range --</option>
            </select>
            <label for="topicSerial">Choose a topic:</label>
            <select id="topicSerial" class="admin-dropdown topic-select">
              <option value="chemistry">Chemistry</option>
              <option value="science">Science</option>
              <option value="astronomy">Astronomy</option>
              <option value="mahabharata">Mahabharata</option>
              <option value="social">Social</option>
            </select>
            <button id="startBtnSerial" class="admin-btn-start start-btn">Start Quiz</button>
          </div>
          <div id="randomModeContainer">
            <label for="topicRandom">Choose a topic:</label>
            <select id="topicRandom" class="admin-dropdown topic-select">
              <option value="chemistry">Chemistry</option>
              <option value="science">Science</option>
              <option value="astronomy">Astronomy</option>
              <option value="mahabharata">Mahabharata</option>
              <option value="social">Social</option>
            </select>
            <button id="startBtnRandom" class="admin-btn-start start-btn">Start Quiz</button>
          </div>
        </div>
      </div>
    </section>

    <!-- QUIZ PAGE -->
    <section id="quiz" class="hidden">
      <div class="quiz-header">
        <div class="quiz-topic">
          <h2 id="topicTitle"></h2>
        </div>
        <div class="quiz-timer">
          <span id="timer">00:00</span>
        </div>
      </div>

      <div id="progress">Question <span id="qnum">1</span> / <span id="qtotal">10</span></div>
      <div id="questionCard">
        <div id="questionText"></div>
        <form id="optionsForm"></form>
      </div>
      <div class="controls">
        <button id="nextBtn" disabled>Next</button>
      </div>
    </section>

    <!-- RESULT LETTER -->
    <section id="reveal" class="hidden">
      <div class="letter-container">
        <div class="letter" id="letter" title="Click to open your score">📩</div>
        <p class="letter-hint">Click the letter to view your results</p>
      </div>
    </section>

    <!-- SCORECARD OVERLAY -->
    <section id="scorecard" class="overlay hidden">
      <div class="scoreBox" id="scoreBox">
        <h2>Your Score</h2>
        <p id="scoreText"></p>

        <div id="answerReview" class="answer-review hidden">
          <h3>Answer Review</h3>
          <div id="reviewContainer"></div>
        </div>

        <button id="restartBtn" class="restart-btn">Try Another Quiz</button>
      </div>
      <div class="party left">🎊</div>
      <div class="party right">🎉</div>
    </section>

    <footer>
      <p>Quiz files are loaded from the local <code>data/</code> folder.</p>
    </footer>
  </main>

  <script src="quiz.js"></script>
</body>
</html>
